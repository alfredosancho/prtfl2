<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #0a0f1e; color: #e2e8f0; min-height: 100vh; padding: 16px; }
  .container { max-width: 480px; margin: 0 auto; }
  .card { background: #111827; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .label { font-size: 10px; letter-spacing: 2px; color: #64748b; text-transform: uppercase; margin-bottom: 10px; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .kpi-card { background: #111827; border-radius: 10px; padding: 12px 14px; }
  .kpi-name { font-size: 10px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .kpi-value { font-size: 16px; font-weight: 500; color: #f1f5f9; }
  .kpi-pct { font-size: 11px; margin-top: 2px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; background: #111827; border-radius: 10px; padding: 4px; }
  .tab { flex: 1; padding: 8px 4px; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 500; background: transparent; color: #64748b; transition: all 0.2s; }
  .tab.active { background: #1e40af; color: #fff; }
  .section { display: none; }
  .section.active { display: block; }
  .bar-row { margin-bottom: 10px; }
  .bar-row-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .bar-row-name { font-size: 13px; color: #94a3b8; }
  .bar-row-value { font-size: 13px; color: #e2e8f0; }
  .bar-bg { height: 5px; background: #1e293b; border-radius: 3px; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .stock-card { background: #0f172a; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .stock-header { display: flex; justify-content: space-between; align-items: center; }
  .stock-body { display: flex; justify-content: space-between; margin-top: 6px; }
  .stock-value { font-size: 16px; color: #e2e8f0; font-family: 'DM Mono', monospace; }
  .stock-weight { font-size: 11px; color: #475569; align-self: flex-end; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { background: #111827; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-label { font-size: 10px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 18px; font-weight: 500; }
  .loading { text-align: center; padding: 60px 20px; color: #64748b; }
  .error { background: #450a0a; border-radius: 10px; padding: 16px; color: #fca5a5; font-size: 13px; line-height: 1.6; }
  .update-time { font-size: 11px; color: #475569; text-align: right; margin-bottom: 8px; }
  .positive { color: #10b981; }
  .negative { color: #ef4444; }
  canvas { max-width: 100%; }
  .time-btns { display: flex; gap: 6px; margin-bottom: 12px; }
  .time-btn { flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid #1e293b; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 500; background: transparent; color: #64748b; transition: all 0.2s; }
  .time-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
  .logo-box { border-radius: 6px; background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 2px; }
  .logo-fallback { border-radius: 6px; background: #1e293b; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-weight: 600; color: #94a3b8; }
  .pie-legend-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #1e293b; }
  .pie-legend-item:last-child { border-bottom: none; }
</style>
</head>

function logoHTML(ticker, size=32) {
  const initials = ticker.replace(/.*:/,'').slice(0,3);
  const sz = `${size}px`;
  if (LOGOS[ticker]) {
    return `<div class="logo-box" style="width:${sz};height:${sz}"><img src="${LOGOS[ticker]}" alt="${ticker}"></div>`;
  }
  const fs = Math.round(size*0.38);
  return `<div class="logo-fallback" style="width:${sz};height:${sz};font-size:${fs}px">${initials}</div>`;
}

async function loadData() {
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();
  const input = data.input, evol = data.evol;

  const stocks = [];
  for (let i=2; i<=20; i++) {
    const row=input[i]; if(!row) continue;
    const ticker=row[1], cv=row[7], ev=row[13];
    if(!ticker||typeof ticker!=='string'||!cv) continue;
    const meta=STOCK_META[ticker]||{sector:'Other',geo:'USA'};
    stocks.push({name:ticker,value:Number(cv),entryValue:Number(ev)||0,...meta});
  }

  const fondoNames=['SP500','MSCI Europe','Small Caps','Familiar-World','Emerging markets'];
  const fondos=[];
  for(let i=30;i<=34;i++){const row=input[i];if(!row)continue;const name=fondoNames[i-30],value=row[4];if(value)fondos.push({name,value:Number(value),geo:FUND_GEO[name]||'Global'});}

  let cash=0; for(let i=39;i<=45;i++){const r=input[i];if(r&&typeof r[2]==='number')cash+=r[2];}
  let pensiones=0; for(let i=48;i<=51;i++){const r=input[i];if(r&&typeof r[2]==='number')pensiones+=r[2];}
  let crypto=0; for(let i=54;i<=56;i++){const r=input[i];if(r&&typeof r[2]==='number')crypto+=r[2];}
  const oro=input[27]?Number(input[27][11])||0:0;

  // Real evolution: data starts at row 46, date=col[1], value=col[2]
  const evolution=[];
  for(let i=46;i<evol.length;i++){
    const row=evol[i]; if(!row||!row[1]||!row[2]) continue;
    if(typeof row[1]!=='string'||!row[1].includes('-')) continue;
    const val=Number(row[2]); if(!val||val<50000) continue;
    const d=new Date(row[1]); if(isNaN(d)) continue;
    const mo=['Ene','Feb','Mar','Apr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    evolution.push({ts:d.getTime(), y:Math.round(val/1000), label:mo[d.getUTCMonth()]+' '+String(d.getUTCFullYear()).slice(2)});
  }

  // Targets: rows 196-204, label=col[0], date=col[1], value=col[4]
  const targets=[];
  for(let i=196;i<=204;i++){
    const row=evol[i]; if(!row||!row[1]||!row[4]) continue;
    const val=Number(row[4]); if(!val||val<50000) continue;
    const d=new Date(row[1]); if(isNaN(d)) continue;
    targets.push({ts:d.getTime(), y:Math.round(val/1000), label:String(row[0]||'')});
  }
  // Anchor targets line to first real data point
  if(evolution.length>0 && targets.length>0 && targets[0].ts > evolution[0].ts) {
    targets.unshift({ts:evolution[0].ts, y:evolution[0].y, label:''});
  }

  return {stocks,fondos,oro,cash,pensiones,crypto,evolution,targets};
}

function buildGeo(data,total){
  const geo={};
  data.stocks.forEach(s=>{geo[s.geo]=(geo[s.geo]||0)+s.value;});
  data.fondos.forEach(f=>{geo[f.geo]=(geo[f.geo]||0)+f.value;});
  geo['Cash']=data.cash;geo['Oro']=data.oro;geo['Plan Pensiones']=data.pensiones;geo['Crypto']=data.crypto;
  return Object.entries(geo).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
}

function doughnut(id,labels,values,colors){

  charts[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'#111827'}]},options:{responsive:true,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fmt(c.raw)}`}}}}});
}

function renderEvoChart(evolution, targets, range) {
  dc('lC');
  const ctx=document.getElementById('lC')?.getContext('2d');if(!ctx)return;
  const now=new Date();
  let minTs=null;
  if(range==='1y') minTs=new Date(now.getFullYear()-1,now.getMonth(),now.getDate()).getTime();
  else if(range==='2y') minTs=new Date(now.getFullYear()-2,now.getMonth(),now.getDate()).getTime();

  const filteredEvol=minTs?evolution.filter(e=>e.ts>=minTs):evolution;
  const step=Math.max(1,Math.floor(filteredEvol.length/35));
  const sampledEvol=filteredEvol.filter((_,i)=>i%step===0||i===filteredEvol.length-1);

  let filteredTargets;
  if(minTs){
    const before=targets.filter(t=>t.ts<minTs);
    const after=targets.filter(t=>t.ts>=minTs);
    filteredTargets=[...(before.length?[before[before.length-1]]:[]),...after];
  } else {
    filteredTargets=targets;
  }

  // Build unified sorted timeline of all timestamps
  const allTs=[...new Set([...sampledEvol.map(e=>e.ts),...filteredTargets.map(t=>t.ts)])].sort((a,b)=>a-b);

  // Map ts -> label (prefer target label, else evolution label)
  const tsToLabel={};
  sampledEvol.forEach(e=>{tsToLabel[e.ts]=e.label;});
  filteredTargets.forEach(t=>{if(t.label)tsToLabel[t.ts]=t.label;});

  const labels=allTs.map(ts=>tsToLabel[ts]||'');

  const evolMap=new Map(sampledEvol.map(e=>[e.ts,e.y]));
  const targetMap=new Map(filteredTargets.map(t=>[t.ts,t.y]));

  const realData=allTs.map(ts=>evolMap.has(ts)?evolMap.get(ts):null);
  const targetData=allTs.map(ts=>targetMap.has(ts)?targetMap.get(ts):null);

  charts['lC']=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Patrimonio real',data:realData,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.15)',borderWidth:2,pointRadius:0,pointHoverRadius:5,fill:true,tension:0.2,spanGaps:false},
        {label:'Objetivo',data:targetData,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.1)',borderWidth:2,pointRadius:5,pointHoverRadius:7,pointBackgroundColor:'#ef4444',pointBorderColor:'#111827',pointBorderWidth:1.5,fill:true,tension:0.3,spanGaps:true}
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#94a3b8',font:{size:11},boxWidth:12,padding:16,usePointStyle:true}},
        tooltip:{callbacks:{label:c=>c.raw!=null?` ${c.dataset.label}: ${c.raw}k€`:null,filter:i=>i.raw!=null}}
      },
      scales:{
        x:{ticks:{color:'#64748b',font:{size:9},maxTicksLimit:8,maxRotation:45},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#64748b',font:{size:10},callback:v=>`${v}k`},grid:{color:'#1e293b'}}
      }
    }
  });
}

function setTimeRange(range,btn){
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(globalData) renderEvoChart(globalData.evolution,globalData.targets,range);
}

function render(data){
  globalData=data;
  const tA=data.stocks.reduce((s,a)=>s+a.value,0);
  const tF=data.fondos.reduce((s,f)=>s+f.value,0);
  const total=tA+tF+data.cash+data.oro+data.pensiones+data.crypto;
  const geo=buildGeo(data,total);
  const gainers=[...data.stocks].sort((a,b)=>parseFloat(gp(b.value,b.entryValue))-parseFloat(gp(a.value,a.entryValue)));
  const stocksSorted=[...data.stocks].sort((a,b)=>b.value-a.value);
  const initVal=(data.evolution[0]?.y||241)*1000;
  const growPct=(((total-initVal)/initVal)*100).toFixed(1);
  const growAbs=total-initVal;
  const now=new Date().toLocaleString('es-ES',{dateStyle:'medium',timeStyle:'short'});

  const dist=[
    {name:'Acciones',value:tA,color:'#3b82f6'},{name:'Fondos',value:tF,color:'#10b981'},
    {name:'Cash',value:data.cash,color:'#475569'},{name:'PP',value:data.pensiones,color:'#8b5cf6'},
    {name:'Oro',value:data.oro,color:'#f59e0b'},{name:'Crypto',value:data.crypto,color:'#06b6d4'}
  ];

  document.getElementById('app').innerHTML=`
    <div class="update-time">Actualizado: ${now}</div>
    <div class="card">
      <div class="label">Patrimonio total</div>
      <div style="font-size:36px;font-weight:300;letter-spacing:-1px;color:#f8fafc">${fmt(total)}</div>
      <div style="font-size:13px;margin-top:4px" class="positive">↑ +${growPct}% · +${fmt(growAbs)}</div>
    </div>
    <div class="kpi-grid">
      ${dist.map(d=>`<div class="kpi-card" style="border-left:3px solid ${d.color}"><div class="kpi-name">${d.name}</div><div class="kpi-value">${fmt(d.value)}</div><div class="kpi-pct" style="color:${d.color}">${pct(d.value,total)}</div></div>`).join('')}
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('ov',this)">General</button>
      <button class="tab" onclick="showTab('geo',this)">Geografía</button>
      <button class="tab" onclick="showTab('st',this)">Acciones</button>
      <button class="tab" onclick="showTab('ev',this)">Evolución</button>
    </div>

    <div id="ov" class="section active">
      <div class="card">
        <div class="label">Distribución patrimonio</div>
        <canvas id="dC" height="180"></canvas>
        <div style="margin-top:14px">${dist.map(d=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:8px;height:8px;border-radius:2px;background:${d.color};flex-shrink:0"></div><span style="font-size:13px;color:#94a3b8;flex:1">${d.name}</span><span style="font-size:13px;color:#e2e8f0">${fmt(d.value)}</span><span style="font-size:12px;color:${d.color};width:42px;text-align:right">${pct(d.value,total)}</span></div>`).join('')}</div>
      </div>
      <div class="card">
        <div class="label">Fondos · ${fmt(tF)}</div>
        ${data.fondos.map(f=>`<div class="bar-row"><div class="bar-row-header"><span class="bar-row-name">${f.name}</span><span class="bar-row-value">${fmt(f.value)}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct(f.value,tF)};background:#10b981"></div></div></div>`).join('')}
      </div>
    </div>

    <div id="geo" class="section">
      <div class="card">
        <div class="label">Geografía completa</div>
        <div style="font-size:11px;color:#475569;margin-bottom:12px">Acciones + fondos + cash + oro + pensiones + crypto</div>
        <canvas id="gC" height="200"></canvas>
        <div style="margin-top:14px">${geo.map(d=>`<div class="bar-row"><div class="bar-row-header"><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:${GEO_COLORS[d.name]||'#94a3b8'};flex-shrink:0"></div><span class="bar-row-name">${d.name}</span></div><div style="display:flex;gap:10px"><span style="font-size:13px;color:#e2e8f0">${fmt(d.value)}</span><span style="font-size:12px;color:${GEO_COLORS[d.name]||'#94a3b8'};width:40px;text-align:right">${pct(d.value,total)}</span></div></div><div class="bar-bg" style="margin-left:14px"><div class="bar-fill" style="width:${pct(d.value,total)};background:${GEO_COLORS[d.name]||'#94a3b8'}"></div></div></div>`).join('')}</div>
      </div>
    </div>

    <div id="st" class="section">
      <div class="card">
        <div class="label">Distribución acciones · ${fmt(tA)}</div>
        <canvas id="sC" height="220"></canvas>
        <div style="margin-top:14px">
          ${stocksSorted.map((s,i)=>`
            <div class="pie-legend-item">
              <div style="width:8px;height:8px;border-radius:2px;background:${STOCK_COLORS[i%STOCK_COLORS.length]};flex-shrink:0"></div>
              ${logoHTML(s.name, 36)}
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;color:#f1f5f9;font-family:'DM Mono',monospace">${s.name.replace(/.*:/,'')}</div>
                <div style="font-size:10px;color:#475569">${s.sector}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:13px;color:#e2e8f0">${fmt(s.value)}</div>
                <div style="font-size:11px;color:${STOCK_COLORS[i%STOCK_COLORS.length]}">${pct(s.value,tA)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div class="card"><div class="label">Rentabilidad</div><canvas id="bC" height="200"></canvas></div>
      <div class="card">
        <div class="label">Posiciones</div>
        ${gainers.map(s=>{
          const g=gp(s.value,s.entryValue),pos=parseFloat(g)>=0;
          return `<div class="stock-card" style="border:1px solid ${pos?'#064e3b':'#450a0a'}">
            <div class="stock-header">
              <div style="display:flex;align-items:center;gap:10px">
                ${logoHTML(s.name,36)}
                <div>
                  <div style="font-size:13px;font-weight:600;color:#f1f5f9;font-family:'DM Mono',monospace">${s.name.replace(/.*:/,'')}</div>
                  <div style="font-size:10px;color:#475569">${s.sector}</div>
                </div>
              </div>
              <span style="font-size:13px;font-weight:500;color:${pos?'#10b981':'#ef4444'}">${pos?'+':''}${g}%</span>
            </div>
            <div class="stock-body">
              <span class="stock-value">${fmt(s.value)}</span>
              <span class="stock-weight">${pct(s.value,tA)}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div id="ev" class="section">
      <div class="card">
        <div class="label">Evolución patrimonio · miles €</div>
        <div class="time-btns">
          <button class="time-btn" onclick="setTimeRange('1y',this)">1 año</button>
          <button class="time-btn" onclick="setTimeRange('2y',this)">2 años</button>
          <button class="time-btn active" onclick="setTimeRange('all',this)">Todo</button>
        </div>
        <canvas id="lC" height="260"></canvas>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Inicio</div><div class="stat-value" style="color:#64748b">${fmt(initVal)}</div></div>
        <div class="stat-card"><div class="stat-label">Hoy</div><div class="stat-value" style="color:#3b82f6">${fmt(total)}</div></div>
        <div class="stat-card"><div class="stat-label">Crecimiento</div><div class="stat-value positive">+${growPct}%</div></div>
        <div class="stat-card"><div class="stat-label">Ganancia</div><div class="stat-value positive">+${fmt(growAbs)}</div></div>
      </div>
    </div>`;

  setTimeout(()=>{
    doughnut('dC',dist.map(d=>d.name),dist.map(d=>d.value),dist.map(d=>d.color));
    doughnut('gC',geo.map(d=>d.name),geo.map(d=>d.value),geo.map(d=>GEO_COLORS[d.name]||'#94a3b8'));
    doughnut('sC',stocksSorted.map(s=>s.name),stocksSorted.map(s=>s.value),stocksSorted.map((_,i)=>STOCK_COLORS[i%STOCK_COLORS.length]));
    bar('bC',gainers.map(s=>s.name.replace(/.*:/,'')),gainers.map(s=>parseFloat(gp(s.value,s.entryValue))),gainers.map(s=>parseFloat(gp(s.value,s.entryValue))>=0?'#10b981':'#ef4444'));
    renderEvoChart(data.evolution,data.targets,'all');
  },50);
}

function showTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),50);
}

loadData()
  .then(data=>{document.getElementById('loading').style.display='none';document.getElementById('app').style.display='block';render(data);})
  .catch(err=>{document.getElementById('loading').innerHTML=`<div class="error">❌ Error: ${err.message}</div>`;});
</script>
</body>
</html>
